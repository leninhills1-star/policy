<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TikTok 로그인 인증 완료</title>
    <style>
        :root {
            --bg: #0a0a0f;
            --surface: #13131a;
            --border: #2a2a38;
            --accent: #6c63ff;
            --accent-glow: rgba(108, 99, 255, 0.15);
            --text: #e8e8f0;
            --muted: #6b6b80;
            --success: #43e97b;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(rgba(108,99,255,.04) 1px, transparent 1px),
                linear-gradient(90deg, rgba(108,99,255,.04) 1px, transparent 1px);
            background-size: 40px 40px;
            pointer-events: none;
            z-index: 0;
        }

        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 32px;
            max-width: 500px;
            width: 100%;
            text-align: center;
            position: relative;
            z-index: 1;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        .icon {
            font-size: 3rem;
            margin-bottom: 16px;
        }

        h1 {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 8px;
            color: var(--text);
        }

        p {
            font-size: 0.9rem;
            color: var(--muted);
            line-height: 1.5;
            margin-bottom: 24px;
        }

        .code-box {
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 16px;
            font-family: monospace;
            font-size: 0.95rem;
            word-break: break-all;
            margin-bottom: 20px;
            color: var(--success);
            text-shadow: 0 0 10px rgba(67, 233, 123, 0.2);
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            padding: 12px 24px;
            background: var(--accent);
            border: none;
            border-radius: 8px;
            color: #fff;
            font-weight: 600;
            font-size: 0.95rem;
            cursor: pointer;
            transition: all 0.2s;
            text-decoration: none;
        }

        .btn:hover {
            background: #5a52d5;
            transform: translateY(-1px);
        }

        .redirect-notice {
            margin-top: 16px;
            font-size: 0.8rem;
            color: var(--accent);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }

        .loader {
            display: inline-block;
            width: 12px; height: 12px;
            border: 2px solid var(--border);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin .7s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="card">
        <div class="icon">✅</div>
        <h1>TikTok 로그인 성공!</h1>
        <p>인증이 완료되었습니다. 자동으로 로컬 앱으로 리다이렉트 중입니다...<br>(만약 자동 이동되지 않으면 아래 코드를 복사해서 프로그램에 직접 입력하세요)</p>
        
        <div class="code-box" id="code-val">코드를 가져오는 중...</div>
        
        <button class="btn" id="copy-btn" onclick="copyCode()">코드 복사하기</button>
        
        <div class="redirect-notice" id="redirect-status">
            <div class="loader"></div> 로컬 서버(localhost:5001)에 연결 중...
        </div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const code = urlParams.get('code');
        
        if (code) {
            document.getElementById('code-val').textContent = code;
            
            // 로컬 서버로 자동 리다이렉션 시도 (1초 후)
            setTimeout(() => {
                window.location.href = `http://localhost:5001/tiktok/callback?code=${code}`;
            }, 1000);
        } else {
            document.getElementById('code-val').textContent = '인증 코드가 URL에 존재하지 않습니다.';
            document.getElementById('redirect-status').style.display = 'none';
        }

        function copyCode() {
            const text = document.getElementById('code-val').textContent;
            navigator.clipboard.writeText(text).then(() => {
                const btn = document.getElementById('copy-btn');
                btn.textContent = '복사 완료!';
                btn.style.background = 'var(--success)';
                btn.style.color = '#000';
                setTimeout(() => {
                    btn.textContent = '코드 복사하기';
                    btn.style.background = 'var(--accent)';
                    btn.style.color = '#fff';
                }, 2000);
            }).catch(() => {
                alert('클립보드 복사에 실패했습니다. 마우스로 드래그해서 복사해 주세요.');
            });
        }
    </script>
</body>
</html>
